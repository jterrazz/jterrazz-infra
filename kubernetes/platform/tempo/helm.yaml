tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  retention: 168h # 7 days
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      # Tempo's ingester WAL flush spikes RAM beyond the 512Mi default —
      # the upstream chart was OOMKilled every few minutes (~3k restarts
      # over 64 days on Hetzner) which also makes `helm --wait` flake.
      memory: 1Gi
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

persistence:
  enabled: true
  storageClassName: manual
  size: 5Gi
