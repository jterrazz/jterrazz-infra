tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  retention: 168h # 7 days
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 512Mi
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

persistence:
  enabled: true
  storageClassName: manual
  size: 5Gi
