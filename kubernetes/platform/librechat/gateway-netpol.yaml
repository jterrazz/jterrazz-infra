# Additive NetworkPolicy that lets LibreChat (platform-ai) reach the gateway.
#
# gateway-intelligence is an app-chart workload. As of app-chart 2.0 its
# generated ingress admits any pod stamped
# `platform-client.jterrazz.com/gateway-intelligence: "true"` (chart consumers
# opt in via spec.platformServices). LibreChat is NOT an app-chart workload
# (its pod labels come from the upstream LibreChat chart), so it can't easily
# stamp that label — hence this bespoke additive policy stays. NetworkPolicies
# are additive, so this extra policy in the gateway's namespace grants
# platform-ai access to pod port 8317 without touching the gateway chart.
#
# ALTERNATIVE (deferred): set the client label via the LibreChat chart's
# podLabels/deployment labels, then this file could be deleted and the gateway's
# chart-rendered label-selector ingress would admit LibreChat automatically.
# Kept explicit for now — one fewer moving part in the third-party chart.
#
# Lives here (not in the gateway repo) because it exists solely for LibreChat;
# apply it alongside the LibreChat deploy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-librechat
  namespace: prod-gateway-intelligence
spec:
  podSelector:
    matchLabels:
      app: gateway-intelligence
      environment: prod
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-ai
      ports:
        - port: 8317
          protocol: TCP
