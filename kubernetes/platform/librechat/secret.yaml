# Syncs LibreChat's secrets from Infisical (/jterrazz-infra/librechat, prod env) into the
# `librechat-credentials-env` Secret, which the LibreChat chart consumes as
# envFrom. Mirrors the cloudflared platform-secret pattern.
#
# Required keys in Infisical /jterrazz-infra/librechat:
#   CREDS_KEY           32-byte hex  (LibreChat credential encryption)
#   CREDS_IV            16-byte hex
#   JWT_SECRET          random
#   JWT_REFRESH_SECRET  random
#   GATEWAY_API_KEY     one of gateway-intelligence's API_KEYS
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: librechat-infisical
  namespace: platform-ai
spec:
  hostAPI: https://eu.infisical.com
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: jterrazz
        envSlug: prod
        secretsPath: /jterrazz-infra/librechat
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: platform-secrets
  # Name MUST be librechat-credentials-env: that's the secret the LibreChat
  # chart wires as envFrom (its `existingSecretName`). Naming it anything else
  # means GATEWAY_API_KEY / JWT_* never reach the container.
  managedSecretReference:
    secretName: librechat-credentials-env
    secretNamespace: platform-ai
    secretType: Opaque
