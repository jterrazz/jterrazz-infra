# Syncs OpenPanel's secrets from Infisical (/jterrazz-infra/openpanel, prod env) into the
# `openpanel-secrets` Secret, consumed as envFrom by op-api / op-worker /
# op-dashboard and by the Postgres Deployment. Mirrors the librechat-infisical
# pattern.
#
# Required keys in Infisical /jterrazz-infra/openpanel:
#   POSTGRES_PASSWORD    strong random — Postgres superuser password
#   DATABASE_URL         postgresql://openpanel:<POSTGRES_PASSWORD>@op-postgres:5432/openpanel
#   DATABASE_URL_DIRECT  same as DATABASE_URL (no pooler here; used by migrations)
#   COOKIE_SECRET        32+ byte random — session/cookie signing
#
# ClickHouse and Redis run without auth (upstream CLICKHOUSE_SKIP_USER_SETUP=1;
# Redis is a queue) and are isolated by the NetworkPolicy in netpol.yaml — no
# credential to store for them. Email (RESEND_API_KEY/SMTP) is intentionally
# omitted: solo usage, no invitations/reset in v1.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: openpanel-infisical
  namespace: platform-analytics
spec:
  hostAPI: https://eu.infisical.com
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: jterrazz
        envSlug: prod
        secretsPath: /jterrazz-infra/openpanel
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: platform-secrets
  managedSecretReference:
    secretName: openpanel-secrets
    secretNamespace: platform-analytics
    secretType: Opaque
