# Loki monolithic (single binary) mode for single-node setup
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    # 90d query-lookback window. NB: compactor retention-delete is not
    # enabled, so on-disk chunks are kept indefinitely regardless (log
    # volume is tiny — ~103M since May); this bound is what actually caps
    # how far back Grafana can query.
    retention_period: 90d

singleBinary:
  replicas: 1
  # GOMEMLIMIT (soft) under the 512Mi hard limit so the Go GC releases
  # memory to the OS as RSS climbs, instead of drifting upward.
  extraEnv:
    - name: GOMEMLIMIT
      value: "400MiB"
  persistence:
    storageClass: manual
    # 10Gi→20Gi headroom for a 90d window (chunks are tiny today but kept
    # indefinitely — see retention_period note). Nominal on hostPath.
    size: 20Gi
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      memory: 512Mi

# Disable distributed mode components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable nginx gateway (accessed internally)
gateway:
  enabled: false

# Disable self-monitoring and tests
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

test:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
