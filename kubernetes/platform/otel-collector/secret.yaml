# Syncs the Langfuse OTLP Basic-Auth header from Infisical (/jterrazz-infrastructure/otel-collector,
# prod env) into the `otel-collector-credentials-env` Secret, which the
# OTel Collector chart consumes via extraEnvs (see helm.yaml). Mirrors the
# cloudflared / librechat InfisicalSecret pattern used elsewhere in this repo
# — real secret material is never committed here, only synced at deploy time.
#
# Required key in Infisical /jterrazz-infrastructure/otel-collector:
#   LANGFUSE_BASIC_AUTH   base64("public_key:secret_key") of your Langfuse
#                         project's API keys. Generate it with:
#                           echo -n "pk-lf-xxx:sk-lf-xxx" | base64
#                         CHANGEME: set the real value in Infisical, not here.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: otel-collector-infisical
  namespace: platform-telemetry
spec:
  hostAPI: https://eu.infisical.com
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: jterrazz
        envSlug: prod
        secretsPath: /jterrazz-infrastructure/otel-collector
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: platform-secrets
  # Name MUST be otel-collector-credentials-env: that's the secret
  # referenced by helm.yaml's extraEnvs.LANGFUSE_BASIC_AUTH.secretKeyRef.
  managedSecretReference:
    secretName: otel-collector-credentials-env
    secretNamespace: platform-telemetry
    secretType: Opaque
