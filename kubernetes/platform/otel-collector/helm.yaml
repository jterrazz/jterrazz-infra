image:
  repository: otel/opentelemetry-collector-contrib

mode: deployment
replicaCount: 1

# NOTE: this chart auto-injects GOMEMLIMIT at 80% of resources.limits.memory
# (→ ~204MiB for the 256Mi limit below), so no manual GOMEMLIMIT is needed.

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 256Mi

# Override the default service name for cleaner DNS
fullnameOverride: otel-collector

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  # Disable unused default ports
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false

# Injects the Langfuse Basic-Auth header value (base64 of
# "public_key:secret_key") from the otel-collector-credentials-env Secret,
# synced from Infisical /otel-collector by secret.yaml. Consumed via
# ${env:LANGFUSE_BASIC_AUTH} in the otlphttp/langfuse exporter below.
extraEnvs:
  - name: LANGFUSE_BASIC_AUTH
    valueFrom:
      secretKeyRef:
        name: otel-collector-credentials-env
        key: LANGFUSE_BASIC_AUTH

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
    # Keeps only GenAI spans (AI SDK / @ai-sdk/otel) before they reach
    # Langfuse: span name prefixed "ai." OR carrying any gen_ai.* semantic-
    # convention attribute (e.g. gen_ai.operation.name). The filter
    # processor DROPS telemetry that matches its condition, so this
    # condition matches (and drops) everything that is NOT a GenAI span.
    # error_mode: ignore -> a span that errors evaluating the condition
    # (e.g. missing attribute) is kept flowing rather than crashing the
    # pipeline.
    filter/genai:
      error_mode: ignore
      traces:
        span:
          - 'not (IsMatch(name, "^ai\\..*") or attributes["gen_ai.operation.name"] != nil)'

  exporters:
    otlphttp/tempo:
      endpoint: http://tempo.platform-telemetry.svc:4318
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: http://loki.platform-telemetry.svc:3100/otlp
      tls:
        insecure: true
    prometheusremotewrite:
      endpoint: http://prometheus-server.platform-telemetry.svc:80/api/v1/write
      tls:
        insecure: true
      # Promote OTLP resource attributes (service.name, deployment.environment)
      # to Prometheus labels. Without this, every app's metrics carry no env
      # label, so an app's prod/next/staging series collide into one. App
      # metric resources here are intentionally low-cardinality (service +
      # environment only), so this adds a `deployment_environment` label
      # without a cardinality blow-up.
      resource_to_telemetry_conversion:
        enabled: true
    otlphttp/langfuse:
      # Langfuse Cloud OTLP ingestion endpoint. Replace with your
      # self-hosted Langfuse instance's endpoint
      # (https://<your-host>/api/public/otel) if not using Langfuse Cloud.
      # NOTE: Langfuse's OTLP endpoint only accepts OTLP/HTTP - it does
      # NOT support gRPC (4317), so this must stay an otlphttp exporter.
      endpoint: https://cloud.langfuse.com/api/public/otel
      headers:
        Authorization: "Basic ${env:LANGFUSE_BASIC_AUTH}"

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/tempo]
      # GenAI-only traces fanned out to Langfuse, in addition to the
      # unchanged traces->Tempo pipeline above.
      traces/langfuse:
        receivers: [otlp]
        processors: [filter/genai, batch]
        exporters: [otlphttp/langfuse]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlphttp/loki]
      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheusremotewrite]
