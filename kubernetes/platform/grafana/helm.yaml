persistence:
  enabled: true
  existingClaim: grafana-data

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

# Sidecar watches ConfigMaps with label grafana_dashboard=1 across all namespaces
sidecar:
  dashboards:
    enabled: true
    searchNamespace: ALL
    label: grafana_dashboard
    labelValue: "1"
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true

# Datasources auto-configured for the telemetry stack
datasources:
  datasources.yaml:
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Tempo
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.platform-telemetry.svc:80
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.platform-telemetry.svc:3100
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.platform-telemetry.svc:3100
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          tracesToMetrics:
            datasourceUid: prometheus

# Disable built-in ingress (we use Traefik IngressRoute)
ingress:
  enabled: false
