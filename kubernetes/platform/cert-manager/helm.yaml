installCRDs: true
# Shorter leader election lease for faster recovery after reboot
# Single-node cluster, so we can use aggressive timeouts
global:
  leaderElection:
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
# Memory limits raised from 32-64Mi: these Go components spike well above
# idle RSS during cert reconciliation / CRD-watch reconnects (the webhook was
# OOM-killed at its 32Mi cap, flipping it 0/1 and timing out `helm --wait`
# during platform deploys). 128Mi gives headroom while staying tiny.
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    memory: 128Mi
webhook:
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      memory: 128Mi
cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
