server:
  persistentVolume:
    existingClaim: prometheus-data
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # 7d of history is plenty for a single-node hobby cluster; halving it
  # from 15d shrinks the head/index working set. retentionSize is a
  # hard ceiling so the TSDB can never balloon disk or RAM regardless
  # of series churn (whichever limit trips first wins).
  retention: "7d"
  retentionSize: "2GB"
  # GOMEMLIMIT (soft) — Go 1.19+ GC tracks it and madvise()s freed
  # pages back to the OS as RSS nears the limit. Kept under the 512Mi
  # hard limit; mmap'd TSDB chunks are page cache (reclaimable, not
  # counted here) so 400MiB leaves ample headroom.
  env:
    - name: GOMEMLIMIT
      value: "400MiB"
  # Enable remote write receiver so OTel collector can push metrics
  extraFlags:
    - "web.enable-remote-write-receiver"
  # Fix data directory permissions (Prometheus runs as nobody:65534)
  initContainers:
    - name: fix-permissions
      image: busybox:1.37
      command: ["sh", "-c", "chown -R 65534:65534 /data"]
      volumeMounts:
        - name: storage-volume
          mountPath: /data

# Disable components not needed
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false

# Infrastructure metrics
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 192Mi
prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
