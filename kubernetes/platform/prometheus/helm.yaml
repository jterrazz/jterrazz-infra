server:
  persistentVolume:
    existingClaim: prometheus-data
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    # Bumped 512→768Mi: the working set reached ~431Mi (84%) after new app
    # metrics + per-environment labels increased the active-series count.
    limits:
      memory: 768Mi
  # 7d of history is plenty for a single-node hobby cluster; halving it
  # from 15d shrinks the head/index working set. retentionSize is a
  # hard ceiling so the TSDB can never balloon disk or RAM regardless
  # of series churn (whichever limit trips first wins).
  retention: "7d"
  retentionSize: "2GB"
  # GOMEMLIMIT (soft) — Go 1.19+ GC tracks it and madvise()s freed
  # pages back to the OS as RSS nears the limit. Kept under the 768Mi
  # hard limit; mmap'd TSDB chunks are page cache (reclaimable, not
  # counted here) so 560MiB leaves ample headroom.
  env:
    - name: GOMEMLIMIT
      value: "560MiB"
  extraFlags:
    # OTel collector pushes metrics here.
    - "web.enable-remote-write-receiver"
    # Let the configmap-reload sidecar hot-reload config via POST /-/reload.
    # Without it every reload got 403 (~1/min of log spam) and config changes
    # only applied on a full pod restart.
    - "web.enable-lifecycle"
  # Fix data directory permissions (Prometheus runs as nobody:65534)
  initContainers:
    - name: fix-permissions
      image: busybox:1.37
      command: ["sh", "-c", "chown -R 65534:65534 /data"]
      volumeMounts:
        - name: storage-volume
          mountPath: /data

# Disable components not needed
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false

# Infrastructure metrics
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 192Mi
prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
