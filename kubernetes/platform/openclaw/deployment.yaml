---
# OpenClaw Deployment
# Runs the gateway with signal-cli for Signal messaging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: platform-automation
  labels:
    app: openclaw
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      # Seed system dirs so agent-installed packages persist across restarts
      initContainers:
        - name: seed-system
          image: ghcr.io/openclaw/openclaw:2026.3.7
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Seed /usr/local from image: add new files, keep existing (agent installs)
              echo "Seeding /usr/local..."
              cp -a -n /usr/local/. /persist-usr-local/ 2>/dev/null || true
              # Seed /opt from image
              echo "Seeding /opt..."
              cp -a -n /opt/. /persist-opt/ 2>/dev/null || true
              echo "System seed complete."
          volumeMounts:
            - name: system-usr-local
              mountPath: /persist-usr-local
            - name: system-opt
              mountPath: /persist-opt
        # Setup config from K8s secrets (merges managed settings into existing config)
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.3.7
          securityContext:
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              CONFIG_DIR=/root/.openclaw
              CONFIG_FILE=$CONFIG_DIR/openclaw.json
              # Create directories
              mkdir -p $CONFIG_DIR

              # Create or update openclaw.json
              python3 -c "
              import json, os
              path = '$CONFIG_FILE'
              try:
                with open(path) as f:
                  config = json.load(f)
                print('Updating existing openclaw.json...')
              except (FileNotFoundError, json.JSONDecodeError):
                config = {}
                print('Creating initial openclaw.json...')

              # Ensure structure exists
              config.setdefault('agents', {}).setdefault('defaults', {})
              config.setdefault('gateway', {}).setdefault('auth', {})

              # Always apply managed settings
              config['agents']['defaults'].setdefault('workspace', '/root/clawd')
              config['agents']['defaults']['model'] = {'primary': 'google-gemini-cli/gemini-3.1-flash-lite-preview'}
              config['agents']['defaults']['models'] = {'google-gemini-cli/gemini-3.1-flash-lite-preview': {}}
              config['gateway'].update({'mode': 'local', 'port': 18789, 'bind': 'lan'})
              config['gateway']['auth']['mode'] = 'token'
              config['gateway']['auth']['token'] = os.environ['GATEWAY_TOKEN']

              with open(path, 'w') as f:
                json.dump(config, f, indent=2)
              "
              chmod 600 $CONFIG_FILE

              # Create credentials directory
              mkdir -p $CONFIG_DIR/credentials
              chmod 700 $CONFIG_DIR

              echo "Init complete."
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GATEWAY_TOKEN
          volumeMounts:
            - name: data
              mountPath: /root
            - name: system-usr-local
              mountPath: /usr/local
            - name: system-opt
              mountPath: /opt
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.7
          imagePullPolicy: Always
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          # Run the gateway
          command: ["node"]
          args: ["/app/dist/entry.js", "gateway", "run"]
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
          volumeMounts:
            - name: data
              mountPath: /root
            - name: system-usr-local
              mountPath: /usr/local
            - name: system-opt
              mountPath: /opt
          resources:
            requests:
              cpu: 50m
              memory: 768Mi
            limits:
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: gateway
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: system-usr-local
          hostPath:
            path: /var/lib/k8s-data/openclaw-system/usr-local
            type: DirectoryOrCreate
        - name: system-opt
          hostPath:
            path: /var/lib/k8s-data/openclaw-system/opt
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: platform-automation
  labels:
    app: openclaw
spec:
  type: ClusterIP
  ports:
    - name: gateway
      port: 18789
      targetPort: gateway
  selector:
    app: openclaw
