---
# Traefik HelmChartConfig
# Configures the k3s-managed Traefik instance

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Global middlewares on websecure entrypoint
    ports:
      websecure:
        middlewares:
          - platform-networking-rate-limit@kubernetescrd
          - platform-networking-compress@kubernetescrd
          - platform-networking-security-headers@kubernetescrd
        http3:
          enabled: true
          advertisedPort: 443
      web:
        redirectTo:
          port: websecure

    # Allow cross-namespace middleware references
    providers:
      kubernetesCRD:
        allowCrossNamespace: true

    # Trust Cloudflare proxy IPs so X-Forwarded-For contains real client IP
    # Required for rate limiting to work per-client instead of per-Cloudflare-node
    additionalArguments:
      - "--entryPoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
