---
# Traefik Middlewares

# Global rate limiting - protects against abuse without impacting normal users
# 100 req/s average with burst of 200 allows normal browsing while blocking aggressive scrapers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: platform-networking
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: rate-limit
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1

---
# Gzip/Brotli compression for text-based responses
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: platform-networking
  labels:
    app.kubernetes.io/name: traefik
spec:
  compress:
    excludedContentTypes:
      - image/png
      - image/jpeg
      - image/gif
      - image/webp

---
# Security headers (HSTS, XSS protection, content-type sniffing, framing)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: platform-networking
  labels:
    app.kubernetes.io/name: traefik
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
    referrerPolicy: strict-origin-when-cross-origin
    customResponseHeaders:
      X-Powered-By: ""
      Server: ""

---
# IP allowlist for private access (Tailscale + private networks)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: private-access
  namespace: platform-networking
  labels:
    app.kubernetes.io/name: traefik
spec:
  ipAllowList:
    sourceRange:
      - "100.64.0.0/10" # Tailscale
      - "10.0.0.0/8" # Private
      - "172.16.0.0/12" # Private
      - "192.168.0.0/16" # Private
      - "127.0.0.1/32" # Localhost

---
# HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: platform-networking
  labels:
    app.kubernetes.io/name: traefik
spec:
  redirectScheme:
    scheme: https
    permanent: true
