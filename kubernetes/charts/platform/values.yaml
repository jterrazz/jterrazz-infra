# Platform chart defaults
# Each platform service overrides these in its platform.yaml

name: ""
host: ""
port: 80
private: true

storage: {}
# storage:
#   size: 1Gi
#   # pathSuffix nests the volume under the app dir (1 dir = 1 app), e.g.
#   # pathSuffix: mongo -> hostPath /var/lib/k8s-data/<name>/mongo
#   pathSuffix: ""

# Infrastructure settings (injected by Ansible at deploy time).
# nodeName is the k8s node name used as the hostPath PV's nodeAffinity
# match (single-node k3s, safety belt against accidental schedule on a
# renamed node).
infrastructure:
  nodeName: ""
