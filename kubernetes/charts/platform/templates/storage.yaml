{{- if .Values.storage }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "platform.name" . }}-data
{{- if .Values.storage.selector }}
  labels:
    app: {{ include "platform.name" . }}
{{- end }}
spec:
  capacity:
    storage: {{ .Values.storage.size }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    # pathSuffix nests a multi-component app's volume under one dir
    # (e.g. librechat/mongo) so the on-disk convention stays 1 dir = 1 app.
    path: /var/lib/k8s-data/{{ include "platform.name" . }}{{ with .Values.storage.pathSuffix }}/{{ . }}{{ end }}
{{- if .Values.storage.hostPathType }}
    type: {{ .Values.storage.hostPathType }}
{{- end }}
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - {{ .Values.infrastructure.nodeName }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "platform.name" . }}-data
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: {{ .Values.storage.size }}
{{- if .Values.storage.selector }}
  selector:
    matchLabels:
      app: {{ include "platform.name" . }}
{{- else }}
  volumeName: {{ include "platform.name" . }}-data
{{- end }}
{{- end }}
