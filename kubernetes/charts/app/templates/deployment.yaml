{{- if eq (include "app.envExists" .) "true" -}}
{{- include "app.validatePlatformServices" . -}}
{{- $secrets := fromYaml (include "app.secretsConfig" .) -}}
{{- $envVars := fromYaml (include "app.envVars" .) -}}
{{- $platformEnv := fromYaml (include "app.platformEnv" .) -}}
{{- $platformClientLabels := fromYaml (include "app.platformClientLabels" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.name" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ include "app.getValue" (dict "ctx" . "key" "replicas" "default" 1) }}
  revisionHistoryLimit: 3
  {{- if .Values.spec.storage }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        rollout/release-revision: {{ .Release.Revision | quote }}
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
        {{- /* Platform-client labels: stamped on pod template labels ONLY
               (never selectorLabels — those are immutable). The target
               platform service's ingress NetworkPolicy selects on these. */}}
        {{- range $key, $value := $platformClientLabels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    spec:
      {{- if not .Values.spec.runAsRoot }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- end }}
      imagePullSecrets:
        - name: registry-credentials
      {{- if .Values.spec.storage }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37@sha256:e226d6308690dbe282443c8c7e57365c96b5228f0fe7f40731b5d84d37a06839
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: {{ include "app.name" . }}
          image: {{ include "app.image" . }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.spec.port }}
          env:
            # Auto-injected PORT
            - name: PORT
              value: {{ .Values.spec.port | quote }}
            {{- /* User-defined environment variables (merged base + env override) */}}
            {{- range $key, $value := $envVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- /* Auto-injected OTEL identity from metadata */}}
            {{- if not (hasKey $envVars "OTEL_SERVICE_NAME") }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "app.name" . }}
            {{- end }}
            {{- if not (hasKey $envVars "OTEL_RESOURCE_ATTRIBUTES") }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ .Values.environment }}"
            {{- end }}
            {{- /* Opt-in platform-service env (spec.platformServices → catalog
                   in _helpers.tpl). This is where OTEL_EXPORTER_OTLP_ENDPOINT
                   and GATEWAY_INTELLIGENCE_BASE_URL now come from — NO longer an
                   unconditional default: an app must declare `otel-collector`
                   (and the egress hole it opens) for telemetry to actually flow.
                   A user-set env of the same name always wins. */}}
            {{- range $key, $value := $platformEnv }}
            {{- if not (hasKey $envVars $key) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- /* Default Node.js heap cap ≈ 75% of the memory request.
                   Skipped entirely if the app sets its own NODE_OPTIONS.
                   Harmless on non-Node runtimes (the var is ignored). */}}
            {{- $nodeHeap := include "app.nodeMaxOldSpace" . }}
            {{- if and $nodeHeap (not (hasKey $envVars "NODE_OPTIONS")) }}
            - name: NODE_OPTIONS
              value: "--max-old-space-size={{ $nodeHeap }}"
            {{- end }}
            {{- /* Secret environment variables from Infisical */}}
            {{- if $secrets.env }}
            {{- range $secrets.env }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretsName" $ }}
                  key: {{ . }}
            {{- end }}
            {{- end }}
          {{- if or .Values.spec.storage .Values.spec.configFiles }}
          volumeMounts:
            {{- if .Values.spec.storage }}
            - name: data
              mountPath: {{ .Values.spec.storage.mountPath }}
            {{- end }}
            {{- range $filename, $content := .Values.spec.configFiles }}
            - name: config
              mountPath: /app/{{ $filename }}
              subPath: {{ $filename }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ include "app.getResource" (dict "ctx" . "key" "cpu" "default" "100m") }}
              memory: {{ include "app.getResource" (dict "ctx" . "key" "memory" "default" "256Mi") }}
            limits:
              memory: {{ include "app.memoryLimit" . }}
          # A startupProbe gates liveness/readiness until the app first
          # answers, so a slow or event-loop-busy boot can't trip liveness
          # and SIGKILL the pod mid-startup (startupFailureThreshold *
          # startupPeriodSeconds = grace window). timeoutSeconds defaults to
          # 5s, not k8s's brutal 1s: an app that also runs in-process
          # background work can briefly exceed 1s on a trivial health route.
          startupProbe:
            httpGet:
              path: {{ .Values.spec.health.path }}
              port: {{ .Values.spec.port }}
            periodSeconds: {{ .Values.spec.health.startupPeriodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.spec.health.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.spec.health.startupFailureThreshold | default 60 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.spec.health.path }}
              port: {{ .Values.spec.port }}
            periodSeconds: {{ .Values.spec.health.periodSeconds }}
            timeoutSeconds: {{ .Values.spec.health.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.spec.health.failureThreshold | default 5 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.spec.health.path }}
              port: {{ .Values.spec.port }}
            periodSeconds: 10
            timeoutSeconds: {{ .Values.spec.health.timeoutSeconds | default 5 }}
            failureThreshold: 3
      {{- if or .Values.spec.storage .Values.spec.configFiles }}
      volumes:
        {{- if .Values.spec.storage }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "app.name" . }}-data
        {{- end }}
        {{- if .Values.spec.configFiles }}
        - name: config
          configMap:
            name: {{ include "app.name" . }}-config
        {{- end }}
      {{- end }}
{{- end }}
