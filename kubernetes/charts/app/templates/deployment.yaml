{{- if eq (include "app.envExists" .) "true" -}}
{{- $secrets := fromYaml (include "app.secretsConfig" .) -}}
{{- $envVars := fromYaml (include "app.envVars" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.name" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ include "app.getValue" (dict "ctx" . "key" "replicas" "default" 1) }}
  revisionHistoryLimit: 3
  {{- if .Values.spec.storage }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if not .Values.spec.runAsRoot }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- end }}
      imagePullSecrets:
        - name: registry-credentials
      {{- if .Values.spec.storage }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.37@sha256:e226d6308690dbe282443c8c7e57365c96b5228f0fe7f40731b5d84d37a06839
          command: ["sh", "-c", "chown -R 1000:1000 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: {{ include "app.name" . }}
          image: {{ include "app.image" . }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.spec.port }}
          env:
            # Auto-injected PORT
            - name: PORT
              value: {{ .Values.spec.port | quote }}
            {{- /* User-defined environment variables (merged base + env override) */}}
            {{- range $key, $value := $envVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- /* Auto-injected OTEL identity from metadata */}}
            {{- if not (hasKey $envVars "OTEL_SERVICE_NAME") }}
            - name: OTEL_SERVICE_NAME
              value: {{ include "app.name" . }}
            {{- end }}
            {{- if not (hasKey $envVars "OTEL_RESOURCE_ATTRIBUTES") }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ .Values.environment }}"
            {{- end }}
            {{- /* Default OTEL endpoint if not overridden by user */}}
            {{- if not (hasKey $envVars "OTEL_EXPORTER_OTLP_ENDPOINT") }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.platform-telemetry:4318"
            {{- end }}
            {{- /* Secret environment variables from Infisical */}}
            {{- if $secrets.env }}
            {{- range $secrets.env }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "app.secretsName" $ }}
                  key: {{ . }}
            {{- end }}
            {{- end }}
          {{- if or .Values.spec.storage .Values.spec.configFiles }}
          volumeMounts:
            {{- if .Values.spec.storage }}
            - name: data
              mountPath: {{ .Values.spec.storage.mountPath }}
            {{- end }}
            {{- range $filename, $content := .Values.spec.configFiles }}
            - name: config
              mountPath: /app/{{ $filename }}
              subPath: {{ $filename }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            requests:
              cpu: {{ include "app.getResource" (dict "ctx" . "key" "cpu" "default" "100m") }}
              memory: {{ include "app.getResource" (dict "ctx" . "key" "memory" "default" "256Mi") }}
            limits:
              memory: {{ include "app.memoryLimit" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.spec.health.path }}
              port: {{ .Values.spec.port }}
            initialDelaySeconds: {{ .Values.spec.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.spec.health.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.spec.health.path }}
              port: {{ .Values.spec.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- if or .Values.spec.storage .Values.spec.configFiles }}
      volumes:
        {{- if .Values.spec.storage }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "app.name" . }}-data
        {{- end }}
        {{- if .Values.spec.configFiles }}
        - name: config
          configMap:
            name: {{ include "app.name" . }}-config
        {{- end }}
      {{- end }}
{{- end }}
