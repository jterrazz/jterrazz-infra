{{- if and (eq (include "app.envExists" .) "true") (eq .Values.environment "prod") -}}
{{- range $name, $json := .Values.spec.dashboards }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.name" $ }}-dashboard-{{ $name }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ include "app.name" $ }}
data:
  {{ include "app.name" $ }}-{{ $name }}.json: |
    {{- $json | nindent 4 }}
{{- end }}
{{- end }}
