# Default values for app chart
# Apps define their config in .infrastructure/application.yaml

metadata:
  name: ""

spec:
  port: 3000
  resources:
    cpu: 100m
    memory: 256Mi
    memoryLimit: ""
  storage: {}
  configFiles: {}
  networkPolicy:
    allowedServices: []
  health:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30

environments: {}

# Set by app CI during helm upgrade --install
environment: ""

# Registry credentials (passed from CI via --set)
registry:
  server: registry.jterrazz.com
  username: ""
  password: ""

# Infrastructure settings (injected by CI via --set)
infrastructure:
  publicIp: ""
  tailscaleHostname: ""
