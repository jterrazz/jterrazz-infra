# Default values for app chart
# Apps define their config in .infrastructure/application.yaml

metadata:
  name: ""

spec:
  port: 3000
  resources:
    cpu: 100m
    memory: 256Mi
    memoryLimit: ""
  storage: {}
  configFiles: {}
  dashboards: {}
  networkPolicy:
    allowedServices: []
  health:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30

environments: {}

# Set by app CI during helm upgrade --install
environment: ""

# Registry credentials (passed from CI via --set)
registry:
  server: registry.jterrazz.com
  username: ""
  password: ""

# Infrastructure settings — historically used to drive external-dns
# annotations. Now external-dns is gone (Pulumi manages private CNAMEs,
# cloudflared auto-creates public ones), so these are accepted but
# unused. Kept for back-compat with the jterrazz-actions CI flags.
infrastructure:
  publicTarget: ""
  tailscaleHostname: ""
