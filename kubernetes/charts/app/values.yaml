# Default values for app chart
# Apps define their config in .infrastructure/application.yaml

metadata:
  name: ""

spec:
  port: 3000
  resources:
    cpu: 100m
    memory: 256Mi
    memoryLimit: ""
  storage: {}
  configFiles: {}
  dashboards: {}
  networkPolicy:
    allowedServices: []
  health:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30

environments: {}

# Set by app CI during helm upgrade --install
environment: ""

# Registry credentials (passed from CI via --set)
registry:
  server: registry.jterrazz.com
  username: ""
  password: ""

# Infrastructure settings (injected by CI via --set).
#
# publicTarget is the hostname/IP that public IngressRoutes resolve to via
# external-dns. Historically this was the VPS public IPv4; with the
# cloudflared migration it's the tunnel hostname
# (<tunnel-id>.cfargotunnel.com). The legacy `publicIp` key is kept as a
# fallback so an older deploy that still passes --set infrastructure.publicIp
# keeps working through the chart transition.
infrastructure:
  publicTarget: ""
  publicIp: ""           # deprecated: fallback for publicTarget
  tailscaleHostname: ""
