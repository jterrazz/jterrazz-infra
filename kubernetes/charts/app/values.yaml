# Default values for app chart
# Apps define their config in .infrastructure/application.yaml

metadata:
  name: ""

spec:
  port: 3000
  resources:
    cpu: 100m
    memory: 256Mi
    memoryLimit: ""
  storage: {}
  configFiles: {}
  dashboards: {}
  # Opt-in in-cluster platform services (chart 2.0). Each name is resolved
  # against the catalog in templates/_helpers.tpl and wires env + egress netpol
  # (+ server-side ingress for a catalog target). Valid: otel-collector,
  # gateway-intelligence. Unknown names hard-fail the render.
  platformServices: []
  networkPolicy:
    # DEPRECATED (chart 2.0): use spec.platformServices instead. Still honored
    # as an egress-only alias for one transition window — see network-policy.yaml.
    # Removal is slated for chart 2.1, once every app has migrated off
    # allowedServices (the signews-web / clawssify-web / clawrr-web-landing
    # signoz sweep is landing now).
    allowedServices: []
  health:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
    # Probe timeouts/thresholds (k8s defaults 1s/3 are too tight for apps
    # that also run in-process background work). Override per-app if needed.
    timeoutSeconds: 5
    failureThreshold: 5
    # startupProbe grace = startupFailureThreshold * startupPeriodSeconds
    # (default 60 * 5s = 5min) before liveness/readiness begin.
    startupPeriodSeconds: 5
    startupFailureThreshold: 60

environments: {}

# Set by app CI during helm upgrade --install
environment: ""

# Registry credentials (passed from CI via --set)
registry:
  server: registry.jterrazz.com
  username: ""
  password: ""
