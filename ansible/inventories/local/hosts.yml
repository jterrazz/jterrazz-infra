---
# Local inventory — OrbStack target.
#
# Targets the OrbStack-hosted Ubuntu VM provisioned by `pulumi up --stack
# local`. The VM is non-isolated (OrbStack auto-mounts the Mac home at
# /mnt/mac/, which the storage role symlinks /var/lib/k8s-data into for
# persistence across `pulumi destroy`). The VM is reached through the
# OrbStack SSH proxy, not a direct port. The host key below matches the
# name the Pulumi dynamic provider emits.
#
# Invoked by `scripts/deploy.sh local`. For a one-shot Ansible run:
#   ansible-playbook -i ansible/inventories/local/hosts.yml \
#     ansible/playbooks/site.yml -e "@<extra-vars-file>"

all:
  children:
    production:
      hosts:
        jterrazz-infra:
          # `orb` is the OrbStack SSH config's only Host entry; the VM is
          # selected via the user-style `root@<vm>@orb` ansible_user.
          ansible_host: orb
          ansible_user: root@jterrazz-infra
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.orbstack/ssh/config -o StrictHostKeyChecking=no"
          # Roles branch on this to skip OS features that don't behave on
          # the OrbStack hypervisor (auditd, the /dev/kmsg backfill the
          # storage role's Mac symlink etc.).
          deployment_target: orbstack
