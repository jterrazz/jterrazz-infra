---
# Local Inventory — OrbStack target.
#
# Targets the OrbStack-hosted Ubuntu VM provisioned by `pulumi up --stack
# local`. The VM is isolated (no /mnt/mac auto-mount) and reachable via
# the OrbStack SSH ProxyCommand instead of a direct port. The hostname
# below is fixed to match the name the Pulumi dynamic provider emits.
#
# Usage:
#   ansible-playbook -i ansible/inventories/local/hosts.yml \
#     ansible/playbooks/site.yml \
#     -e "@<extra-vars-file-with-secrets>"

all:
  children:
    production:
      hosts:
        jterrazz-infra:
          # `orb` is the OrbStack SSH config's only Host entry; the VM is
          # selected via the user-style `root@<vm>@orb` ansible_user below.
          ansible_host: orb
          ansible_user: root@jterrazz-infra
          ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.orbstack/ssh/config -o StrictHostKeyChecking=no"
          # Used by Ansible roles that branch on the deployment target
          # (e.g. storage role choosing the data path, security role
          # deciding whether to expose SSH publicly).
          deployment_target: orbstack
