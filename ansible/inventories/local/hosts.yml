---
# OrbStack-hosted Ubuntu VM running the k3s cluster.
#
# Provisioned by `pulumi up --stack local` (see pulumi/src/machine.ts).
# The VM is non-isolated, so OrbStack auto-mounts the Mac home at
# /mnt/mac/ and the storage role symlinks /var/lib/k8s-data into the
# `~/.jterrazz-infra/data/` directory there — that's what makes the data
# survive `pulumi destroy && pulumi up`.
#
# The VM is reached through OrbStack's SSH proxy (`orb` Host entry in
# ~/.orbstack/ssh/config), not a direct TCP port. The user-style
# `root@<vm>@orb` selects the right VM in multi-VM setups.
#
# Invoked by `scripts/deploy.sh`. For a one-shot Ansible run:
#   ansible-playbook -i ansible/inventories/local/hosts.yml \
#     ansible/playbooks/site.yml -e "@<extra-vars-file>"

all:
  hosts:
    jterrazz-infra:
      ansible_host: orb
      ansible_user: root@jterrazz-infra
      ansible_ssh_common_args: "-F {{ lookup('env', 'HOME') }}/.orbstack/ssh/config -o StrictHostKeyChecking=no"
      # Roles branch on this to skip OS features that don't behave on
      # the OrbStack hypervisor (auditd, /dev/kmsg backfill, etc.).
      deployment_target: orbstack
