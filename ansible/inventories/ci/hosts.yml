---
# CI Inventory — OrbStack target, reached over Tailscale.
#
# Used by the `deploy-platform.yaml` GitHub Actions workflow. The GHA
# runner joins the tailnet as `tag:ci`, then ssh's into the OrbStack VM
# via its Tailscale MagicDNS name. The SSH private key is fetched live
# from Infisical (/jterrazz-infra → CI_DEPLOY_SSH_PRIVATE) and written
# to a tempfile that ansible consumes via -e ansible_ssh_private_key_file.
#
# The matching public key is installed in root's authorized_keys by the
# `security` role (see `security_ci_deploy_pubkey` default).
#
# NOT for laptop use — that's `inventories/local/hosts.yml`, which goes
# through the OrbStack SSH proxy.

all:
  children:
    production:
      hosts:
        jterrazz-infra:
          # MagicDNS FQDN of the OrbStack VM. The runner has accept-dns
          # via tailscale/github-action, so this resolves to 100.x.
          ansible_host: jterrazz-infra.tail77a797.ts.net
          ansible_user: root
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes"
          # Match the role flag the storage / security roles branch on,
          # so they skip the auditd / OS bits that don't behave inside
          # OrbStack's hypervisor.
          deployment_target: orbstack
