---
# Base System Setup
# Installs essential packages and configures the system foundation

- name: Base System Setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display deployment target
      ansible.builtin.debug:
        msg: "Deploying to {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        connect_timeout: 20
        timeout: 300

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - jq
          - ca-certificates
          - gnupg
          - lsb-release
          - python3-pip
          - python3-yaml
          - python3-kubernetes
          - iptables
          # OrbStack VMs ship without sshd (host-side ProxyCommand handles
          # SSH instead). The security role expects `sshd -t` to be present
          # to validate its config; install it so the same hardening applies
          # to OrbStack VMs as to Hetzner VPSs.
          - openssh-server
        state: present

    # Ubuntu's openssh-server package creates /run/sshd lazily on service
    # start, so a fresh install that hasn't started the service yet fails
    # `sshd -t` validation later in the security role. Starting + enabling
    # the unit here makes the role's idempotent reconfigure work even on
    # the very first deploy.
    - name: Ensure ssh service is started and enabled
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true

    # OrbStack VMs in isolated mode (and some other lightweight setups)
    # don't expose /dev/kmsg, which kubelet opens at startup; without it
    # k3s crashloops with "open /dev/kmsg: no such file or directory".
    # Non-isolated OrbStack VMs do have it as a normal character device,
    # so we only create the symlink-to-/dev/console fallback when kmsg is
    # actually missing. The systemd-tmpfiles entry recreates the symlink
    # on reboot if needed.
    - name: Stat /dev/kmsg
      ansible.builtin.stat:
        path: /dev/kmsg
      register: kmsg_dev
      when: deployment_target | default('hetzner') == 'orbstack'

    - name: Backfill /dev/kmsg when the kernel doesn't expose it
      when:
        - deployment_target | default('hetzner') == 'orbstack'
        - not kmsg_dev.stat.exists | default(true)
      block:
        - name: Persist /dev/kmsg symlink via tmpfiles.d
          ansible.builtin.copy:
            dest: /etc/tmpfiles.d/orbstack-kmsg.conf
            content: "L /dev/kmsg - - - - /dev/console\n"
            mode: "0644"

        - name: Create /dev/kmsg now
          ansible.builtin.file:
            src: /dev/console
            dest: /dev/kmsg
            state: link
            force: true

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Configure system limits for Kubernetes
      ansible.builtin.blockinfile:
        path: /etc/security/limits.d/kubernetes.conf
        create: true
        mode: "0644"
        block: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 65536
          * hard nproc 65536
