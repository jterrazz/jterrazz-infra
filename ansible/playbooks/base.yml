---
# Base System Setup
# Installs essential packages and configures the system foundation

- name: Base System Setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display deployment target
      ansible.builtin.debug:
        msg: "Deploying to {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        connect_timeout: 20
        timeout: 300

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - unzip
          - jq
          - ca-certificates
          - gnupg
          - lsb-release
          - python3-pip
          - python3-yaml
          - python3-kubernetes
          - iptables
          # OrbStack VMs ship without sshd (host-side ProxyCommand handles
          # SSH instead). The security role expects `sshd -t` to be present
          # to validate its config; install it so the same hardening applies
          # to OrbStack VMs as to Hetzner VPSs. Has no effect on hosts that
          # already ship it.
          - openssh-server
        state: present

    # Ubuntu's openssh-server package creates /run/sshd lazily on service
    # start, so a fresh install that hasn't started the service yet fails
    # `sshd -t` validation later in the security role. Starting + enabling
    # the unit here makes the role's idempotent reconfigure work on
    # bare-metal-like setups (OrbStack) and is a no-op on Hetzner where
    # sshd is already up.
    - name: Ensure ssh service is started and enabled
      ansible.builtin.systemd:
        name: ssh
        state: started
        enabled: true

    # OrbStack's lightweight kernel doesn't expose /dev/kmsg, which kubelet
    # opens at startup; k3s crashes immediately with "open /dev/kmsg: no
    # such file or directory". Symlinking it to /dev/console makes kubelet
    # happy — kmsg writes end up on console (which is fine for a dev VM).
    # systemd-tmpfiles recreates the symlink on every boot.
    - name: Ensure /dev/kmsg exists on OrbStack VMs
      when: deployment_target | default('hetzner') == 'orbstack'
      block:
        - name: Persist /dev/kmsg symlink via tmpfiles.d
          ansible.builtin.copy:
            dest: /etc/tmpfiles.d/orbstack-kmsg.conf
            content: "L /dev/kmsg - - - - /dev/console\n"
            mode: "0644"

        - name: Create /dev/kmsg now
          ansible.builtin.file:
            src: /dev/console
            dest: /dev/kmsg
            state: link
            force: true

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Configure system limits for Kubernetes
      ansible.builtin.blockinfile:
        path: /etc/security/limits.d/kubernetes.conf
        create: true
        mode: "0644"
        block: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 65536
          * hard nproc 65536
