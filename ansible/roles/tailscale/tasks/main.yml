---
# Tailscale Installation and Configuration

# OrbStack's Ubuntu image ships with systemd-resolved masked. Without a
# stub resolver, Tailscale falls back to writing /etc/resolv.conf
# directly with `nameserver 100.100.100.100`, and that resolver does not
# chase CNAMEs from a public zone (jterrazz.com) into the tailnet zone
# (*.ts.net). The deploy then fails at "helm registry login
# registry.jterrazz.com" because the CNAME → tailnet hostname chain is
# not followed. Hetzner's stock image already has resolved running, so
# the symlink + restart below are no-ops there.
- name: Ensure systemd-resolved is enabled (needed for CNAME chasing into tailnet)
  ansible.builtin.systemd:
    name: systemd-resolved
    masked: false
    enabled: true
    state: started
    daemon_reload: true

- name: Point /etc/resolv.conf at systemd-resolved stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  register: resolv_conf_link

- name: Check if Tailscale is installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

# Only needed when tailscaled was already running with a stale resolv.conf
# (the fresh-install branch below starts the daemon AFTER the symlink is
# in place, so it picks up resolved on its own).
- name: Restart tailscaled to pick up systemd-resolved integration
  ansible.builtin.systemd:
    name: tailscaled
    state: restarted
  when:
    - resolv_conf_link.changed
    - tailscale_binary.stat.exists

- name: Install Tailscale
  when: not tailscale_binary.stat.exists
  block:
    - name: Add Tailscale GPG key
      ansible.builtin.apt_key:
        url: https://pkgs.tailscale.com/stable/ubuntu/focal.noarmor.gpg
        keyring: /usr/share/keyrings/tailscale-archive-keyring.gpg
        state: present

    - name: Add Tailscale repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu focal main"
        state: present
        update_cache: true

    - name: Install Tailscale package
      ansible.builtin.apt:
        name: tailscale
        state: present

- name: Enable Tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: "{{ tailscale_service_enabled }}"
    state: "{{ tailscale_service_state }}"

- name: Check if already connected to Tailscale
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      tailscale status --json | grep -q '"BackendState":"Running"'
    executable: /bin/bash
  register: tailscale_connected
  changed_when: false
  failed_when: false

- name: Connect to Tailscale
  ansible.builtin.command: >
    tailscale up
    --client-id={{ tailscale_oauth_client_id }}
    --client-secret={{ tailscale_oauth_client_secret }}
    --hostname={{ tailscale_hostname }}
    --advertise-tags={{ tailscale_tags | join(',') }}
    {% if tailscale_advertise_routes %}--advertise-routes={{ tailscale_advertise_routes | join(',') }}{% endif %}
    {% if tailscale_accept_routes %}--accept-routes{% endif %}
    {% if tailscale_accept_dns %}--accept-dns{% endif %}
  when:
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""
    - tailscale_connected.rc != 0
  changed_when: true

- name: Get Tailscale IP
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false
  failed_when: false
