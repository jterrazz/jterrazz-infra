---
# Tailscale Installation and Configuration

# OrbStack's Ubuntu image ships with systemd-resolved masked. Without a
# stub resolver, Tailscale falls back to writing /etc/resolv.conf
# directly with `nameserver 100.100.100.100`, and that resolver does
# not chase CNAMEs from a public zone (jterrazz.com) into the tailnet
# zone (*.ts.net). The deploy then fails at "helm registry login
# registry.jterrazz.com" because the CNAME chain is not followed.
- name: Ensure systemd-resolved is enabled (needed for CNAME chasing into tailnet)
  ansible.builtin.systemd:
    name: systemd-resolved
    masked: false
    enabled: true
    state: started
    daemon_reload: true

# OrbStack's DHCP hands out a bogus DNS server (0.250.250.200) that
# silently drops queries; without overriding it, resolved tries the
# bogus IP first and CoreDNS upstream forwarding times out for any
# name that isn't in the tailnet. Force a working public resolver as
# the global default.
- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Configure systemd-resolved global DNS overrides
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/upstream.conf
    mode: "0644"
    content: |
      [Resolve]
      DNS=1.1.1.1 9.9.9.9
      FallbackDNS=1.0.0.1 8.8.8.8
  register: resolved_conf

- name: Restart systemd-resolved when DNS config changed
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_conf.changed

- name: Point /etc/resolv.conf at systemd-resolved stub
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  register: resolv_conf_link

- name: Check if Tailscale is installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

# Only needed when tailscaled was already running with a stale resolv.conf
# (the fresh-install branch below starts the daemon AFTER the symlink is
# in place, so it picks up resolved on its own).
- name: Restart tailscaled to pick up systemd-resolved integration
  ansible.builtin.systemd:
    name: tailscaled
    state: restarted
  when:
    - resolv_conf_link.changed
    - tailscale_binary.stat.exists

- name: Install Tailscale
  when: not tailscale_binary.stat.exists
  block:
    - name: Add Tailscale GPG key
      ansible.builtin.apt_key:
        url: https://pkgs.tailscale.com/stable/ubuntu/focal.noarmor.gpg
        keyring: /usr/share/keyrings/tailscale-archive-keyring.gpg
        state: present

    - name: Add Tailscale repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu focal main"
        state: present
        update_cache: true

    - name: Install Tailscale package
      ansible.builtin.apt:
        name: tailscale
        state: present

- name: Enable Tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: "{{ tailscale_service_enabled }}"
    state: "{{ tailscale_service_state }}"

- name: Check if already connected to Tailscale
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      tailscale status --json | grep -Eq '"BackendState"[[:space:]]*:[[:space:]]*"Running"'
    executable: /bin/bash
  register: tailscale_connected
  changed_when: false
  failed_when: false

- name: Connect to Tailscale
  ansible.builtin.command: >
    tailscale up
    --client-id={{ tailscale_oauth_client_id }}
    --client-secret={{ tailscale_oauth_client_secret }}
    --hostname={{ tailscale_hostname }}
    --advertise-tags={{ tailscale_tags | join(',') }}
    {% if tailscale_advertise_routes %}--advertise-routes={{ tailscale_advertise_routes | join(',') }}{% endif %}
    {% if tailscale_accept_routes %}--accept-routes{% endif %}
    {% if tailscale_accept_dns %}--accept-dns{% endif %}
  when:
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""
    - tailscale_connected.rc != 0
  changed_when: true

# Boot-time self-heal: after a host reboot tailscaled can come back
# "Logged out" (e.g. node-key expiry) and does NOT auto-reconnect. A
# logged-out node can't resolve *.ts.net, so registry.jterrazz.com pulls
# NXDOMAIN and every app pod ImagePullBackOffs (Cloudflare then 503s the
# public hostnames). This oneshot unit re-auths on every boot if needed.
- name: Set up Tailscale boot-time auto-reauth
  when:
    - tailscale_oauth_client_id != ""
    - tailscale_oauth_client_secret != ""
  block:
    - name: Create Tailscale config directory
      ansible.builtin.file:
        path: /etc/tailscale
        state: directory
        mode: "0700"

    - name: Write Tailscale auto-reauth credentials
      ansible.builtin.template:
        src: tailscale-autoauth.env.j2
        dest: /etc/tailscale/autoauth.env
        mode: "0600"

    - name: Install Tailscale auto-reauth script
      ansible.builtin.template:
        src: tailscale-autoauth.sh.j2
        dest: /usr/local/bin/tailscale-autoauth.sh
        mode: "0750"

    - name: Install Tailscale auto-reauth systemd unit
      ansible.builtin.template:
        src: tailscale-autoauth.service.j2
        dest: /etc/systemd/system/tailscale-autoauth.service
        mode: "0644"

    - name: Enable Tailscale auto-reauth service
      ansible.builtin.systemd:
        name: tailscale-autoauth.service
        enabled: true
        daemon_reload: true

- name: Get Tailscale IP
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false
  failed_when: false
