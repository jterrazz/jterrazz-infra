---
# Storage Setup
# Creates directories for Kubernetes persistent volumes

# /var/lib/k8s-data is a symlink to a Mac folder mounted via OrbStack's
# auto file-share (/mnt/mac/...). hostPath PVs reference /var/lib/k8s-data
# directly, so the on-disk path stays stable, but the data lives on the
# Mac and survives `pulumi destroy` of the VM.
- name: Link /var/lib/k8s-data to the Mac bind dir on OrbStack
  when: deployment_target == 'orbstack'
  block:
    - name: Resolve Mac bind dir
      ansible.builtin.set_fact:
        # OrbStack mounts the Mac user's home at /mnt/mac/Users/<user>.
        # The data folder is created by the Pulumi OrbStack provider before
        # the VM is started, so this path is always present here.
        orbstack_data_dir: "/mnt/mac/Users/{{ lookup('env', 'USER') }}/.jterrazz-infra/data"

    - name: Replace /var/lib/k8s-data with a symlink to the Mac dir
      ansible.builtin.file:
        src: "{{ orbstack_data_dir }}"
        dest: /var/lib/k8s-data
        state: link
        force: true

# Base directory for all k8s storage. Skipped on OrbStack because the
# symlink above already makes /var/lib/k8s-data resolve to a real path.
- name: Create base storage directory
  when: deployment_target != 'orbstack'
  ansible.builtin.file:
    path: /var/lib/k8s-data
    state: directory
    mode: "0755"
    owner: root
    group: root

# Static storage directories for apps that need persistent data
# These directories survive app deletion (unlike dynamic local-path provisioner)
# Mode 0755 — containers manage their own file ownership via securityContext
- name: Create app storage directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /var/lib/k8s-data/n8n
    - /var/lib/k8s-data/portainer
